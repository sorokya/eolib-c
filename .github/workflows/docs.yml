name: GitHub Pages
on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v6
        with:
          submodules: "recursive"

      - name: Install dependencies
        run: sudo apt-get install -y libjson-c-dev

      - name: Build Library (generates protocol sources for Doxygen)
        uses: threeal/cmake-action@v2.1.0

      - name: Setup Emscripten
        uses: mymindstorm/setup-emsdk@v14

      - name: Build WASM demo
        run: cd wasm && ./build.sh

      - name: Build Documentation
        uses: mattnotmitt/doxygen-action@v1.9.5

      - name: Assemble Pages
        run: |
          mkdir -p dist/docs dist/demo
          cp -r docs/html/. dist/docs/
          cp wasm/index.html wasm/eolib.js wasm/eolib.wasm wasm/packets.js dist/demo/
          cp .github/pages-index.html dist/index.html

      - name: Publish to GitHub Pages
        if: github.ref == 'refs/heads/master'
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
