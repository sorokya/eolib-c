name: GitHub Pages
on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v6
        with:
          submodules: "recursive"

      - name: Install dependencies
        run: sudo apt-get install -y libjson-c-dev

      - name: Build Library (generates protocol sources for Doxygen)
        uses: threeal/cmake-action@v2.1.0

      - name: Setup Emscripten
        uses: mymindstorm/setup-emsdk@v14

      - name: Build WASM demo
        run: cd wasm && ./build.sh

      - name: Install Doxygen
        shell: bash
        run: |
          wget https://github.com/doxygen/doxygen/releases/download/Release_1_16_1/doxygen-1.16.1.linux.bin.tar.gz
          tar xzvf doxygen-1.16.1.linux.bin.tar.gz
          cd doxygen-1.16.1
          sudo make install
          cd ..
          rm -rf doxygen-1.16.1*

      - name: Generate Documentation
        run: doxygen

      - name: Assemble Pages
        run: |
          mkdir -p dist/docs dist/demo
          cp -r docs/html/. dist/docs/
          cp wasm/index.html wasm/eolib.js wasm/eolib.wasm wasm/packets.js dist/demo/
          cp .github/pages-index.html dist/index.html

      - name: Publish to GitHub Pages
        if: github.ref == 'refs/heads/master'
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
