name: Build Library
on:
  push:
    branches: [master]
    tags: ["*"]
  pull_request:
    branches: [master]

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-24.04
            compiler: gcc
            cc: gcc
            cxx: g++
            package_platform: Linux.x64
            build_type: Release
            upload: true

          - os: ubuntu-24.04
            compiler: clang
            cc: clang
            cxx: clang++
            package_platform: Linux.Clang.x64
            build_type: Release
            upload: false

          - os: ubuntu-24.04-arm
            compiler: gcc
            cc: gcc
            cxx: g++
            package_platform: Linux.arm64
            build_type: Release
            upload: true

          - os: ubuntu-24.04-arm
            compiler: clang
            cc: clang
            cxx: clang++
            package_platform: Linux.Clang.arm64
            build_type: Release
            upload: false

          - os: macos-26
            compiler: clang
            cc: clang
            cxx: clang++
            package_platform: macOS.arm64
            build_type: Release
            upload: true

          - os: macos-26
            compiler: gcc
            package_platform: macOS.GCC.arm64
            build_type: Release
            upload: false

          - os: macos-26-intel
            compiler: clang
            cc: clang
            cxx: clang++
            package_platform: macOS.x64
            build_type: Release
            upload: true

          - os: macos-26-intel
            compiler: gcc
            package_platform: macOS.GCC.x64
            build_type: Release
            upload: false

          - os: windows-2025
            compiler: msvc
            generator: Visual Studio 17 2022
            msvc_arch: x64
            vcpkg_triplet: x64-windows
            package_platform: Windows.VS2022.x64
            build_type: Release
            upload: true

          - os: windows-2025
            compiler: msvc
            generator: Visual Studio 17 2022
            msvc_arch: Win32
            vcpkg_triplet: x86-windows
            package_platform: Windows.VS2022.x86
            build_type: Release
            upload: true

          - os: windows-2025
            compiler: clang-cl
            generator: Visual Studio 17 2022
            msvc_arch: x64
            toolset: ClangCL
            vcpkg_triplet: x64-windows
            package_platform: Windows.ClangCL.x64
            build_type: Release
            upload: false

          - os: windows-2025
            compiler: mingw
            msys_system: mingw64
            msys_pkg_prefix: mingw-w64-x86_64
            cc: gcc
            cxx: g++
            generator: Ninja
            package_platform: Windows.MinGW.x64
            build_type: Release
            upload: true

          - os: windows-2025
            compiler: mingw
            msys_system: mingw32
            msys_pkg_prefix: mingw-w64-i686
            cc: gcc
            cxx: g++
            generator: Ninja
            package_platform: Windows.MinGW.x86
            build_type: Release
            upload: true

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: "recursive"

      - name: Setup MSVC
        if: startsWith(matrix.compiler, 'msvc') || matrix.compiler == 'clang-cl'
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: ${{ matrix.msvc_arch }}

      - name: Setup MinGW
        if: matrix.compiler == 'mingw'
        uses: msys2/setup-msys2@v2
        with:
          msystem: ${{ matrix.msys_system }}
          update: true
          install: >-
            ${{ matrix.msys_pkg_prefix }}-gcc
            ${{ matrix.msys_pkg_prefix }}-cmake
            ${{ matrix.msys_pkg_prefix }}-ninja
            ${{ matrix.msys_pkg_prefix }}-libxml2
            ${{ matrix.msys_pkg_prefix }}-json-c
            ${{ matrix.msys_pkg_prefix }}-lua

      - name: Setup Clang (Linux)
        if: matrix.compiler == 'clang' && startsWith(matrix.os, 'ubuntu')
        run: sudo apt-get update && sudo apt-get install -y clang

      - name: Setup Ninja (Linux)
        if: (matrix.compiler == 'gcc' || matrix.compiler == 'clang') && startsWith(matrix.os, 'ubuntu')
        run: sudo apt-get update && sudo apt-get install -y ninja-build

      - name: Setup json-c (Linux)
        if: (matrix.compiler == 'gcc' || matrix.compiler == 'clang') && startsWith(matrix.os, 'ubuntu')
        run: sudo apt-get update && sudo apt-get install -y libjson-c-dev

      - name: Setup Lua (Linux)
        if: (matrix.compiler == 'gcc' || matrix.compiler == 'clang') && startsWith(matrix.os, 'ubuntu')
        run: sudo apt-get update && sudo apt-get install -y liblua5.4-dev lua5.4

      - name: Set Compiler Env (Unix)
        if: matrix.compiler == 'gcc' || matrix.compiler == 'clang'
        run: |
          echo "CC=${{ matrix.cc }}" >> "$GITHUB_ENV"
          echo "CXX=${{ matrix.cxx }}" >> "$GITHUB_ENV"

      - name: Setup GCC (macOS)
        if: matrix.compiler == 'gcc' && startsWith(matrix.os, 'macos')
        run: |
          gcc_path=$(ls -1 /opt/homebrew/bin/gcc-[0-9]* /usr/local/bin/gcc-[0-9]* 2>/dev/null | sort -V | tail -1)
          gxx_path=$(ls -1 /opt/homebrew/bin/g++-[0-9]* /usr/local/bin/g++-[0-9]* 2>/dev/null | sort -V | tail -1)
          echo "CC=${gcc_path:-gcc}" >> "$GITHUB_ENV"
          echo "CXX=${gxx_path:-g++}" >> "$GITHUB_ENV"

      - name: Setup libxml2/json-c (macOS)
        if: startsWith(matrix.os, 'macos')
        run: |
          brew install libxml2 json-c lua
          if [[ -d /opt/homebrew/opt/libxml2/lib/pkgconfig ]]; then
            echo "PKG_CONFIG_PATH=/opt/homebrew/opt/libxml2/lib/pkgconfig" >> "$GITHUB_ENV"
          elif [[ -d /usr/local/opt/libxml2/lib/pkgconfig ]]; then
            echo "PKG_CONFIG_PATH=/usr/local/opt/libxml2/lib/pkgconfig" >> "$GITHUB_ENV"
          fi

      - name: Setup libxml2 (Windows)
        if: matrix.compiler == 'msvc' || matrix.compiler == 'clang-cl'
        uses: lukka/run-vcpkg@v11
        with:
          vcpkgJsonGlob: vcpkg.json
          vcpkgConfigurationJsonGlob: vcpkg-configuration.json

      - name: Configure (MSVC/ClangCL)
        if: matrix.compiler == 'msvc' || matrix.compiler == 'clang-cl'
        run: >-
          cmake -S . -B build -G "${{ matrix.generator }}"
          -A ${{ matrix.msvc_arch }}
          -DCMAKE_TOOLCHAIN_FILE=${{ env.VCPKG_ROOT }}\\scripts\\buildsystems\\vcpkg.cmake
          -DVCPKG_TARGET_TRIPLET=${{ matrix.vcpkg_triplet }}
          -DEOLIB_PACKAGE_PLATFORM=${{ matrix.package_platform }}
          -DEOLIB_BUILD_LUA_BINDINGS=ON
          ${{ matrix.toolset && format('-T {0}', matrix.toolset) || '' }}

      - name: Build (MSVC/ClangCL)
        if: matrix.compiler == 'msvc' || matrix.compiler == 'clang-cl'
        run: cmake --build build --config ${{ matrix.build_type }}

      - name: Reconfigure (MSVC/ClangCL)
        if: matrix.compiler == 'msvc' || matrix.compiler == 'clang-cl'
        run: cmake -S . -B build -D CMAKE_SUPPRESS_REGENERATION=ON

      - name: Configure (MinGW)
        if: matrix.compiler == 'mingw'
        shell: msys2 {0}
        run: >-
          cmake -S . -B build -G "${{ matrix.generator }}"
          -DCMAKE_BUILD_TYPE=${{ matrix.build_type }}
          -DEOLIB_PACKAGE_PLATFORM=${{ matrix.package_platform }}
          -DEOLIB_BUILD_LUA_BINDINGS=ON

      - name: Build (MinGW)
        if: matrix.compiler == 'mingw'
        shell: msys2 {0}
        run: cmake --build build

      - name: Reconfigure (MinGW)
        if: matrix.compiler == 'mingw'
        shell: msys2 {0}
        run: cmake -S . -B build

      - name: Configure (Unix)
        if: matrix.compiler == 'gcc' || matrix.compiler == 'clang'
        run: >-
          cmake -S . -B build -G Ninja
          -DCMAKE_C_COMPILER=$CC
          -DCMAKE_CXX_COMPILER=$CXX
          -DCMAKE_BUILD_TYPE=${{ matrix.build_type }}
          -DEOLIB_PACKAGE_PLATFORM=${{ matrix.package_platform }}
          -DEOLIB_BUILD_LUA_BINDINGS=ON

      - name: Build (Unix)
        if: matrix.compiler == 'gcc' || matrix.compiler == 'clang'
        run: cmake --build build

      - name: Reconfigure (Unix)
        if: matrix.compiler == 'gcc' || matrix.compiler == 'clang'
        run: cmake -S . -B build

      - name: Cache vcpkg artifacts (Windows)
        if: matrix.compiler == 'msvc' || matrix.compiler == 'clang-cl'
        uses: actions/cache@v4
        with:
          path: ${{ runner.workspace }}\vcpkg_installed
          key: vcpkg-${{ matrix.os }}-${{ matrix.vcpkg_triplet }}-62159a45e18f3a9ac0548628dcaf74fcb60c6ff9

      - name: Run Tests
        if: matrix.compiler != 'mingw'
        run: ctest --output-on-failure -C ${{ matrix.build_type }} --test-dir build

      - name: Run Tests (MinGW)
        if: matrix.compiler == 'mingw'
        shell: msys2 {0}
        run: ctest --output-on-failure --test-dir build

      - name: Run Lua Tests
        if: matrix.compiler != 'msvc' && matrix.compiler != 'clang-cl' && matrix.compiler != 'mingw'
        run: cmake --build build --target lua-test

      - name: Run Lua Tests (MinGW)
        if: matrix.compiler == 'mingw'
        shell: msys2 {0}
        run: cmake --build build --target lua-test

      - name: Package
        run: cpack --config build/CPackConfig.cmake -C ${{ matrix.build_type }} -B build/package

      - name: Package Lua
        if: matrix.upload == true
        shell: bash
        run: |
          VERSION=$(grep -oP 'set\(EOLIB_VERSION "\K[^"]+' CMakeLists.txt)
          cmake --install build --config ${{ matrix.build_type }} --component lua_bindings --prefix lua-stage
          cd lua-stage && cmake -E tar cf "../build/package/eolib-${VERSION}-Lua-${{ matrix.package_platform }}.zip" --format=zip -- .

      - name: Upload Packages
        if: matrix.upload == true
        uses: actions/upload-artifact@v7
        with:
          name: package-${{ matrix.package_platform }}
          path: |
            ./build/package/*.zip
            ./build/package/*.tar.xz

  build-wasm:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: "recursive"

      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y ninja-build libxml2-dev libjson-c-dev emscripten

      - name: Generate protocol sources
        run: |
          cmake -S . -B build -G Ninja
          cmake --build build --target generate_protocol

      - name: Build WASM
        run: cd wasm && ./build.sh

      - name: Package WASM
        run: |
          VERSION=$(grep -oP 'set\(EOLIB_VERSION "\K[^"]+' CMakeLists.txt)
          cd wasm && zip "eolib-${VERSION}-WASM.zip" eolib.js eolib.wasm eolib.wasm.map

      - name: Upload WASM artifact
        uses: actions/upload-artifact@v7
        with:
          name: package-WASM
          path: wasm/eolib-*.zip

  release:
    if: startsWith(github.ref, 'refs/tags/')
    needs: [build, build-wasm]
    runs-on: ubuntu-24.04
    steps:
      - name: Download Packages
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Publish Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          token: ${{ secrets.RELEASE_TOKEN }}
          files: |
            dist/**/*.zip
            dist/**/*.tar.xz
