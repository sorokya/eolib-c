name: Build Library
on:
  push:
    branches: [master]
    tags: ["*"]
  pull_request:
    branches: [master]

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-24.04
            compiler: gcc
            cc: gcc
            cxx: g++
            package_platform: Linux-AMD64
            build_type: Release

          - os: ubuntu-24.04
            compiler: clang
            cc: clang
            cxx: clang++
            package_platform: Linux-AMD64
            build_type: Release

          - os: ubuntu-24.04-arm
            compiler: gcc
            cc: gcc
            cxx: g++
            package_platform: Linux-ARM64
            build_type: Release

          - os: ubuntu-24.04-arm
            compiler: clang
            cc: clang
            cxx: clang++
            package_platform: Linux-ARM64
            build_type: Release

          - os: macos-26
            compiler: clang
            cc: clang
            cxx: clang++
            package_platform: macOS-ARM64
            build_type: Release

          - os: macos-26
            compiler: gcc
            package_platform: macOS-ARM64
            build_type: Release

          - os: macos-26-intel
            compiler: clang
            cc: clang
            cxx: clang++
            package_platform: macOS-AMD64
            build_type: Release

          - os: macos-26-intel
            compiler: gcc
            package_platform: macOS-AMD64
            build_type: Release

          - os: windows-2025
            compiler: msvc
            generator: Visual Studio 17 2022
            msvc_arch: x64
            vcpkg_triplet: x64-windows
            package_platform: Windows-AMD64
            build_type: Release

          - os: windows-2025
            compiler: clang-cl
            generator: Visual Studio 17 2022
            msvc_arch: x64
            toolset: ClangCL
            vcpkg_triplet: x64-windows
            package_platform: Windows-AMD64
            build_type: Release

          - os: windows-2025
            compiler: mingw
            msys_system: mingw64
            cc: gcc
            cxx: g++
            generator: Ninja
            package_platform: Windows-AMD64
            build_type: Release

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: "recursive"

      - name: Setup MSVC
        if: startsWith(matrix.compiler, 'msvc') || matrix.compiler == 'clang-cl'
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: ${{ matrix.msvc_arch }}

      - name: Setup MinGW
        if: matrix.compiler == 'mingw'
        uses: msys2/setup-msys2@v2
        with:
          msystem: ${{ matrix.msys_system }}
          update: true
          install: >-
            mingw-w64-x86_64-gcc
            mingw-w64-x86_64-cmake
            mingw-w64-x86_64-ninja
            mingw-w64-x86_64-libxml2

      - name: Setup Clang (Linux)
        if: matrix.compiler == 'clang' && startsWith(matrix.os, 'ubuntu')
        run: sudo apt-get update && sudo apt-get install -y clang

      - name: Setup Ninja (Linux)
        if: (matrix.compiler == 'gcc' || matrix.compiler == 'clang') && startsWith(matrix.os, 'ubuntu')
        run: sudo apt-get update && sudo apt-get install -y ninja-build

      - name: Set Compiler Env (Unix)
        if: matrix.compiler == 'gcc' || matrix.compiler == 'clang'
        run: |
          echo "CC=${{ matrix.cc }}" >> "$GITHUB_ENV"
          echo "CXX=${{ matrix.cxx }}" >> "$GITHUB_ENV"

      - name: Setup GCC (macOS)
        if: matrix.compiler == 'gcc' && startsWith(matrix.os, 'macos')
        run: |
          gcc_path=$(ls -1 /opt/homebrew/bin/gcc-[0-9]* /usr/local/bin/gcc-[0-9]* 2>/dev/null | sort -V | tail -1)
          gxx_path=$(ls -1 /opt/homebrew/bin/g++-[0-9]* /usr/local/bin/g++-[0-9]* 2>/dev/null | sort -V | tail -1)
          echo "CC=${gcc_path:-gcc}" >> "$GITHUB_ENV"
          echo "CXX=${gxx_path:-g++}" >> "$GITHUB_ENV"

      - name: Setup libxml2 (macOS)
        if: startsWith(matrix.os, 'macos')
        run: |
          brew install libxml2
          if [[ -d /opt/homebrew/opt/libxml2/lib/pkgconfig ]]; then
            echo "PKG_CONFIG_PATH=/opt/homebrew/opt/libxml2/lib/pkgconfig" >> "$GITHUB_ENV"
          elif [[ -d /usr/local/opt/libxml2/lib/pkgconfig ]]; then
            echo "PKG_CONFIG_PATH=/usr/local/opt/libxml2/lib/pkgconfig" >> "$GITHUB_ENV"
          fi

      - name: Setup libxml2 (Windows)
        if: matrix.compiler == 'msvc' || matrix.compiler == 'clang-cl'
        uses: lukka/run-vcpkg@v11
        with:
          vcpkgJsonGlob: vcpkg.json
          vcpkgConfigurationJsonGlob: vcpkg-configuration.json

      - name: Cache vcpkg artifacts (Windows)
        if: matrix.compiler == 'msvc' || matrix.compiler == 'clang-cl'
        uses: actions/cache@v4
        with:
          path: ${{ runner.workspace }}\vcpkg_installed
          key: vcpkg-${{ matrix.os }}-${{ matrix.vcpkg_triplet }}-62159a45e18f3a9ac0548628dcaf74fcb60c6ff9

      - name: Configure (MSVC/ClangCL)
        if: matrix.compiler == 'msvc' || matrix.compiler == 'clang-cl'
        run: >-
          cmake -S . -B build -G "${{ matrix.generator }}"
          -A ${{ matrix.msvc_arch }}
          -DCMAKE_TOOLCHAIN_FILE=${{ env.VCPKG_ROOT }}\\scripts\\buildsystems\\vcpkg.cmake
          -DEOLIB_PACKAGE_PLATFORM=${{ matrix.package_platform }}
          ${{ matrix.toolset && format('-T {0}', matrix.toolset) || '' }}

      - name: Build (MSVC/ClangCL)
        if: matrix.compiler == 'msvc' || matrix.compiler == 'clang-cl'
        run: cmake --build build --config ${{ matrix.build_type }}

      - name: Configure (MinGW)
        if: matrix.compiler == 'mingw'
        shell: msys2 {0}
        run: >-
          cmake -S . -B build -G "${{ matrix.generator }}"
          -DCMAKE_BUILD_TYPE=${{ matrix.build_type }}
          -DEOLIB_PACKAGE_PLATFORM=${{ matrix.package_platform }}

      - name: Build (MinGW)
        if: matrix.compiler == 'mingw'
        shell: msys2 {0}
        run: cmake --build build

      - name: Configure (Unix)
        if: matrix.compiler == 'gcc' || matrix.compiler == 'clang'
        run: >-
          cmake -S . -B build -G Ninja
          -DCMAKE_C_COMPILER=$CC
          -DCMAKE_CXX_COMPILER=$CXX
          -DCMAKE_BUILD_TYPE=${{ matrix.build_type }}
          -DEOLIB_PACKAGE_PLATFORM=${{ matrix.package_platform }}

      - name: Build (Unix)
        if: matrix.compiler == 'gcc' || matrix.compiler == 'clang'
        run: cmake --build build

      - name: Run Tests
        run: ctest --output-on-failure -C ${{ matrix.build_type }} --test-dir build

      - name: Install
        run: cmake --install build --config ${{ matrix.build_type }} --prefix build/install

      - name: Package
        run: cpack --config build/CPackConfig.cmake -C ${{ matrix.build_type }} -B build/package

      - name: Package Hashes (Windows)
        if: startsWith(matrix.os, 'windows')
        shell: pwsh
        run: >-
          Get-ChildItem -Path build/package -File | Where-Object { $_.Extension -ne '.sha256' }
          | ForEach-Object
          {"$((Get-FileHash -Algorithm SHA256 $_.FullName).Hash)  $($_.Name)" |
          Set-Content -Path ("$($_.FullName).sha256") }

      - name: Package Hashes (Unix)
        if: "!startsWith(matrix.os, 'windows')"
        run: |
          cd build/package
          for f in *; do
            if [ -f "$f" ] && [ "${f##*.}" != "sha256" ]; then
              shasum -a 256 "$f" > "$f.sha256"
            fi
          done

      - name: Upload Artifacts
        uses: actions/upload-artifact@v7
        with:
          name: install-${{ matrix.os }}-${{ matrix.compiler }}
          path: ./build/install

      - name: Upload Packages
        uses: actions/upload-artifact@v7
        with:
          name: package-${{ matrix.os }}-${{ matrix.compiler }}
          path: ./build/package

  release:
    if: startsWith(github.ref, 'refs/tags/')
    needs: build
    runs-on: ubuntu-24.04
    steps:
      - name: Download Packages
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Publish Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: dist/**
